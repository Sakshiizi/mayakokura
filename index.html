<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romantic Love Page Templates</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Dancing+Script:wght@400;700&amp;family=Quicksand:wght@300;400;600&amp;family=Cinzel:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    @keyframes floatHeart { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; } 50% { transform: translateY(-40px) rotate(15deg) scale(1.1); opacity: 1; } 100% { transform: translateY(-80px) rotate(-10deg) scale(0.9); opacity: 0; } }
    @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(180, 30, 30, 0.3); } 50% { box-shadow: 0 0 40px rgba(180, 30, 30, 0.6); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cloudDrift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(20px); } }
    .float-heart { animation: floatHeart 4s ease-in-out infinite; }
    .sparkle { animation: sparkle 2s ease-in-out infinite; }
    .glow-pulse { animation: glowPulse 3s ease-in-out infinite; }
    .gold-shimmer { background: linear-gradient(90deg, #c9a84c, #f5e6a3, #c9a84c, #f5e6a3, #c9a84c); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }
    .fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
    .fade-up-d1 { animation-delay: 0.1s; }
    .fade-up-d2 { animation-delay: 0.3s; }
    .fade-up-d3 { animation-delay: 0.5s; }
    .fade-up-d4 { animation-delay: 0.7s; }
    .fade-up-d5 { animation-delay: 0.9s; }
    .cloud-drift { animation: cloudDrift 8s ease-in-out infinite; }
    .template-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .template-card:hover { transform: translateY(-4px); }
    .placeholder-zone { border: 2px dashed; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
    .placeholder-zone:hover { transform: scale(1.02); }
    .placeholder-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .download-btn { transition: all 0.3s; }
    .download-btn:hover { transform: translateY(-2px); }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto bg-black">
   <!-- LANDING PAGE -->
   <div id="landing-page" class="w-full h-full flex flex-col items-center justify-center" style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);padding:20px;">
    <div style="text-align:center;max-width:600px;">
     <div style="font-size:80px;margin-bottom:24px;">
      💌
     </div>
     <h1 style="font-family:'Playfair Display',serif;font-size:48px;color:white;margin:0 0 16px;font-weight:700;">Love Messages</h1>
     <p style="font-family:'Quicksand',sans-serif;font-size:18px;color:rgba(255,255,255,0.9);margin:0 0 48px;line-height:1.6;">Choose the perfect occasion and create a beautiful message to share with your loved one</p>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:32px;max-width:500px;margin-left:auto;margin-right:auto;">
      <button onclick="selectOccasion('proposal')" style="padding:24px 16px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;color:white;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(8px);" onmouseover="this.style.background='rgba(255,255,255,0.25)';this.style.transform='translateY(-4px)'" onmouseout="this.style.background='rgba(255,255,255,0.15)';this.style.transform='translateY(0)'">
       <div style="font-size:32px;margin-bottom:8px;">
        💍
       </div>Proposal</button> <button onclick="selectOccasion('birthday')" style="padding:24px 16px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;color:white;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(8px);" onmouseover="this.style.background='rgba(255,255,255,0.25)';this.style.transform='translateY(-4px)'" onmouseout="this.style.background='rgba(255,255,255,0.15)';this.style.transform='translateY(0)'">
       <div style="font-size:32px;margin-bottom:8px;">
        🎂
       </div>Birthday Wish</button> <button onclick="selectOccasion('congratulations')" style="padding:24px 16px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;color:white;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(8px);" onmouseover="this.style.background='rgba(255,255,255,0.25)';this.style.transform='translateY(-4px)'" onmouseout="this.style.background='rgba(255,255,255,0.15)';this.style.transform='translateY(0)'">
       <div style="font-size:32px;margin-bottom:8px;">
        🎉
       </div>Congratulations!</button> <button onclick="selectOccasion('valentine')" style="padding:24px 16px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;color:white;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(8px);" onmouseover="this.style.background='rgba(255,255,255,0.25)';this.style.transform='translateY(-4px)'" onmouseout="this.style.background='rgba(255,255,255,0.15)';this.style.transform='translateY(0)'">
       <div style="font-size:32px;margin-bottom:8px;">
        💕
       </div>Will you be my Valentine?</button>
     </div>
    </div>
   </div><!-- EDITOR PAGE -->
   <div id="editor-page" class="w-full h-full overflow-auto flex flex-col" style="display:none;background:#0f0f0f;">
    <!-- Navigation Bar -->
    <nav id="theme-nav" class="sticky top-0 z-50 w-full" style="display:none;background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08);">
     <div class="max-w-6xl mx-auto px-4 py-4">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:16px;">
       <div style="display:flex;align-items:center;gap:16px;">
        <button onclick="backToLanding()" style="background:transparent;border:none;color:white;font-size:24px;cursor:pointer;padding:8px;display:flex;align-items:center;"><i data-lucide="arrow-left" style="width:20px;height:20px;"></i></button>
        <h1 id="nav-title" style="font-family: 'Playfair Display', serif;color:white;font-size:18px;font-weight:600;margin:0;">💌 Love Page Templates</h1>
       </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
       <button onclick="switchTheme('cute')" id="btn-cute" class="theme-btn px-4 py-2 rounded-full text-sm font-medium transition-all" style="background: #ff8fab; color: #fff;">🍑 Peachy</button> <button onclick="switchTheme('luxury')" id="btn-luxury" class="theme-btn px-4 py-2 rounded-full text-sm font-medium transition-all" style="background: rgba(201,168,76,0.2); color: #c9a84c; border: 1px solid #c9a84c;">✨ Sparkle</button> <button onclick="switchTheme('dark')" id="btn-dark" class="theme-btn px-4 py-2 rounded-full text-sm font-medium transition-all" style="background: rgba(180,30,30,0.2); color: #e05050; border: 1px solid #600;">🌙 Midnight</button> <button onclick="switchTheme('dreamy')" id="btn-dreamy" class="theme-btn px-4 py-2 rounded-full text-sm font-medium transition-all" style="background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.4);">☁️ Dreamy</button>
      </div>
      <div id="variant-selector" class="flex gap-2 flex-wrap" style="display:none;">
       <button onclick="switchVariant(1)" id="btn-variant-1" class="variant-btn px-3 py-2 rounded-full text-xs font-medium transition-all" style="background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3);">Style 1</button> <button onclick="switchVariant(2)" id="btn-variant-2" class="variant-btn px-3 py-2 rounded-full text-xs font-medium transition-all" style="background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2);">Style 2</button>
      </div>
     </div>
    </nav><!-- Template Container -->
    <div id="template-container" class="w-full flex-1"></div>
   </div>
  </div>
  <script>
    let currentRecordId = null;
    let isCreatingLink = false;
    let currentTheme = 'cute';
    let currentVariant = 1;
    let currentOccasion = null;
    let uploadedImages = { img1: null, img2: null, img3: null, img4: null, img5: null, img6: null, img7: null, img8: null };

    const defaultConfig = {
      sender_name: '', recipient_name: 'My Love', love_message: '', page_subtitle: 'A letter written from the heart',
      font_family: 'Playfair Display', font_size: 16, background_color: '#0f0f0f', surface_color: '#1a1a2e',
      text_color: '#ffffff', primary_action_color: '#ff8fab', secondary_action_color: '#c9a84c'
    };

    const dataHandler = { onDataChanged(data) { } };
    
    async function initializeDataSDK() {
      const result = await window.dataSdk.init(dataHandler);
      if (!result.isOk) console.error('Failed to init data SDK');
    }
    
    initializeDataSDK();

    function getConfig() { return window.elementSdk?.config || defaultConfig; }

    function selectOccasion(occasion) {
      currentOccasion = occasion;
      document.getElementById('landing-page').style.display = 'none';
      document.getElementById('editor-page').style.display = 'flex';
      document.getElementById('theme-nav').style.display = 'block';
      renderTemplate();
    }

    function backToLanding() {
      document.getElementById('landing-page').style.display = 'flex';
      document.getElementById('editor-page').style.display = 'none';
      currentTheme = 'cute'; currentVariant = 1;
    }

    function heartSVG(color, size = 24) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
    }

    function placeholderHTML(id, type, borderColor, textColor, bgColor) {
      const uploaded = uploadedImages[id];
      const icon = type === 'video' ? 'video' : 'image';
      const label = type === 'video' ? 'Upload Video' : 'Upload Image';
      const accept = type === 'video' ? 'video/*' : 'image/*';
      const innerContent = uploaded ? (type === 'video' ? `<video src="${uploaded}" style="width:100%;height:100%;object-fit:cover;" autoplay muted loop></video>` : `<img src="${uploaded}" style="width:100%;height:100%;object-fit:cover;" alt="Uploaded" loading="lazy">`) : `<i data-lucide="${icon}" style="width:32px;height:32px;color:${textColor};opacity:0.6;"></i><span style="color:${textColor};opacity:0.6;font-size:13px;">${label}</span>`;
      return `<div class="placeholder-zone" style="border-color:${borderColor};background:${bgColor};">${innerContent}<input type="file" accept="${accept}" onchange="handleUpload(event,'${id}','${type}')"></div>`;
    }

    function handleUpload(e, id, type) {
      const file = e.target.files[0];
      if (!file) return;
      uploadedImages[id] = URL.createObjectURL(file);
      renderTemplate();
    }

    function createShareableLink() {
      if (isCreatingLink) return;
      isCreatingLink = true;
      const config = getConfig();
      const linkId = 'link_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      const record = {
        id: linkId, occasion: currentOccasion || 'love',
        sender_name: config.sender_name || defaultConfig.sender_name,
        recipient_name: config.recipient_name || defaultConfig.recipient_name,
        love_message: config.love_message || defaultConfig.love_message,
        page_subtitle: config.page_subtitle || defaultConfig.page_subtitle,
        theme: currentTheme, variant: currentVariant,
        created_at: new Date().toISOString()
      };
      window.dataSdk.create(record).then(result => {
        if (result.isOk) {
          const shareUrl = `${window.location.origin}${window.location.pathname}?share=${linkId}`;
          alert('✨ Link created! ' + shareUrl);
        } else alert('Error creating link');
        isCreatingLink = false;
      });
    }

    // PEACHY THEME
    function renderPeachyTemplate1(c) {
      return `<div id="template-content" style="position:relative;min-height:100%;background:linear-gradient(180deg, #fff0f3 0%, #ffd6e0 30%, #ffb3c6 60%, #ff8fab 100%);overflow:hidden;font-family:'Quicksand',sans-serif;"><div style="position:relative;z-index:2;max-width:720px;margin:0 auto;padding:40px 20px;"><div class="fade-up fade-up-d1" style="text-align:center;margin-bottom:32px;"><div style="font-size:48px;margin-bottom:8px;">💕</div><h2 id="t-recipient" style="font-family:'Dancing Script',cursive;font-size:${(c.font_size||16)*2.5}px;color:#d63384;margin:0;">To ${c.recipient_name || defaultConfig.recipient_name}</h2><input id="t-subtitle-input" type="text" value="${c.page_subtitle || defaultConfig.page_subtitle}" oninput="updateSubtitle(this.value)" style="background:transparent;border:none;border-bottom:2px solid #c2185b;color:#c2185b;font-size:${(c.font_size||16)*0.9}px;margin-top:8px;text-align:center;font-family:'Quicksand',sans-serif;padding:4px 8px;width:80%;opacity:0.8;"></div><div class="fade-up fade-up-d2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;"><div style="aspect-ratio:4/5;">${placeholderHTML('img1','image','#ff8fab88','#d63384','rgba(255,143,171,0.15)')}</div><div style="aspect-ratio:4/5;">${placeholderHTML('img2','image','#ff8fab88','#d63384','rgba(255,143,171,0.15)')}</div></div><div class="fade-up fade-up-d3" style="background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);border-radius:20px;padding:32px;margin-bottom:24px;border:1px solid rgba(255,143,171,0.3);"><div style="text-align:center;margin-bottom:16px;">${heartSVG('#ff6b8a', 28)}</div><textarea id="t-message-input" oninput="updateMessage(this.value)" style="width:100%;border:none;background:transparent;font-family:'${c.font_family||defaultConfig.font_family}',serif;font-size:${(c.font_size||16)*1.1}px;color:#880e4f;line-height:1.8;text-align:center;resize:none;outline:none;min-height:80px;padding:8px;">${c.love_message || defaultConfig.love_message}</textarea></div><div class="fade-up fade-up-d4" style="aspect-ratio:16/9;margin-bottom:24px;">${placeholderHTML('video','video','#ff8fab88','#d63384','rgba(255,143,171,0.1)')}</div><div class="fade-up fade-up-d5" style="text-align:center;padding:24px 0;"><p style="color:#c2185b;font-size:${(c.font_size||16)*0.85}px;margin:0 0 4px;">With all my love,</p><input id="t-sender-input" type="text" value="${c.sender_name || defaultConfig.sender_name}" oninput="updateSenderNameTemplate(this.value)" style="background:transparent;border:none;border-bottom:2px solid #d63384;font-family:'Dancing Script',cursive;font-size:${(c.font_size||16)*2}px;color:#d63384;text-align:center;padding:4px 8px;width:90%;outline:none;"></div><div style="text-align:center;padding:16px 0;"><button onclick="createShareableLink()" style="background:#ff6b8a;color:white;border:none;padding:12px 32px;border-radius:50px;font-size:14px;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;"><span style="display:inline-flex;align-items:center;gap:8px;"><i data-lucide="share-2" style="width:16px;height:16px;"></i> Create Link</span></button></div></div></div>`;
    }

    function renderPeachyTemplate2(c) {
      return `<div id="template-content" style="position:relative;min-height:100%;background:linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a76 100%);overflow:hidden;font-family:'Quicksand',sans-serif;"><div style="position:relative;z-index:2;max-width:720px;margin:0 auto;padding:40px 20px;"><div class="fade-up fade-up-d1" style="text-align:center;margin-bottom:32px;"><div style="font-size:48px;margin-bottom:8px;animation:float 3s ease-in-out infinite;">🌺</div><h2 id="t-recipient" style="font-family:'Playfair Display',serif;font-size:${(c.font_size||16)*2.5}px;color:#d2691e;margin:0;letter-spacing:1px;">FOR ${c.recipient_name?.toUpperCase() || defaultConfig.recipient_name.toUpperCase()}</h2><input id="t-subtitle-input" type="text" value="${c.page_subtitle || defaultConfig.page_subtitle}" oninput="updateSubtitle(this.value)" style="background:transparent;border:none;border-bottom:2px solid #cd853f;color:#8b6914;font-size:${(c.font_size||16)*0.85}px;margin-top:12px;text-align:center;font-family:'Quicksand',sans-serif;padding:8px;width:80%;opacity:0.85;"></div><div class="fade-up fade-up-d2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;"><div style="aspect-ratio:4/5;">${placeholderHTML('img1','image','#daa52088','#d2691e','rgba(210,105,30,0.12)')}</div><div style="aspect-ratio:4/5;">${placeholderHTML('img2','image','#daa52088','#d2691e','rgba(210,105,30,0.12)')}</div></div><div class="fade-up fade-up-d3" style="background:rgba(255,255,255,0.5);backdrop-filter:blur(10px);border-radius:16px;padding:28px;margin-bottom:24px;border:2px solid rgba(218,165,32,0.3);box-shadow:0 8px 32px rgba(255,140,0,0.1);"><div style="text-align:center;margin-bottom:12px;">${heartSVG('#e97451', 26)}</div><textarea id="t-message-input" oninput="updateMessage(this.value)" style="width:100%;border:none;background:transparent;font-family:'${c.font_family||defaultConfig.font_family}',serif;font-size:${(c.font_size||16)*1.1}px;color:#8b4513;line-height:1.7;text-align:center;resize:none;outline:none;min-height:90px;padding:8px;">${c.love_message || defaultConfig.love_message}</textarea></div><div class="fade-up fade-up-d4" style="aspect-ratio:16/9;margin-bottom:24px;">${placeholderHTML('video','video','#daa52088','#d2691e','rgba(210,105,30,0.1)')}</div><div class="fade-up fade-up-d5" style="text-align:center;padding:24px 0;"><p style="color:#cd853f;font-size:${(c.font_size||16)*0.8}px;margin:0 0 8px;font-style:italic;">Forever yours,</p><input id="t-sender-input" type="text" value="${c.sender_name || defaultConfig.sender_name}" oninput="updateSenderNameTemplate(this.value)" style="background:transparent;border:none;border-bottom:2px solid #d2691e;font-family:'Dancing Script',cursive;font-size:${(c.font_size||16)*1.9}px;color:#d2691e;text-align:center;padding:4px 8px;width:90%;outline:none;"></div><div style="text-align:center;padding:16px 0;"><button onclick="createShareableLink()" style="background:#e97451;color:white;border:none;padding:12px 32px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;box-shadow:0 4px 15px rgba(233,116,81,0.3);" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(233,116,81,0.4)';" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(233,116,81,0.3)';"><span style="display:inline-flex;align-items:center;gap:8px;"><i data-lucide="share-2" style="width:16px;height:16px;"></i> Share</span></button></div></div></div>`;
    }

    // LUXURY/SPARKLE THEME
